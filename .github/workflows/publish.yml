name: Publish to PyPI

# Publishing is gated on a human cutting a GitHub Release: the
# release-published event is the deliberate, irreversible trigger (PyPI
# uploads are append-only — a name+version can never be re-uploaded).
# Pushing to main never publishes; only creating a Release does.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    # The `pypi` environment is the match-point for trusted publishing: the
    # publisher configured on PyPI must name this same environment, alongside
    # the owner/repo and this workflow's filename (publish.yml). Mismatch on
    # any of those and PyPI rejects the upload. The url only links the GitHub
    # deployment to the project page.
    environment:
      name: pypi
      url: https://pypi.org/p/coddpiece

    permissions:
      # Required for trusted publishing: lets the job mint a short-lived OIDC
      # token that PyPI exchanges for a one-time upload credential. No API
      # token is stored in the repo, in Actions secrets, or anywhere else.
      id-token: write
      # Declaring a permissions block drops every UNLISTED scope to `none`, so
      # contents must be granted explicitly — otherwise actions/checkout has no
      # read access and fails with a misleading "Repository not found".
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Build a fresh sdist + wheel from the tagged source rather than trusting
      # any pre-existing artifact, so the published files are exactly what this
      # workflow built from the release commit.
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      # The blessed PyPI action: uploads everything in dist/ over trusted
      # publishing, generating PEP 740 attestations automatically. There is
      # deliberately no `with: password:` — the OIDC exchange supplies the
      # credential.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
